services:
  - type: web
    name: ccpipeline-api
    env: python
    rootDir: api
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_MODEL
        value: gemini-3-flash
      - key: GEMINI_ENABLE_SCHEDULING
        value: "true"
      - key: PYTHON_VERSION
        value: 3.12.10
