<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="card" x1="100" y1="120" x2="1080" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="blur" x="-200" y="-200" width="1600" height="1200" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="24" fill="url(#bg)"/>

  <g filter="url(#blur)">
    <circle cx="220" cy="180" r="120" fill="#60A5FA" fill-opacity="0.45"/>
    <circle cx="980" cy="560" r="150" fill="#34D399" fill-opacity="0.32"/>
    <circle cx="760" cy="200" r="90" fill="#22D3EE" fill-opacity="0.28"/>
  </g>

  <rect x="80" y="90" width="1040" height="540" rx="24" fill="url(#card)" stroke="rgba(255,255,255,0.2)"/>

  <g stroke="rgba(255,255,255,0.5)">
    <path d="M180 500 C 280 420, 340 420, 440 360 C 520 310, 590 320, 700 250 C 800 185, 890 210, 980 140" stroke-width="3"/>
    <circle cx="180" cy="500" r="7" fill="#F8FAFC"/>
    <circle cx="440" cy="360" r="7" fill="#F8FAFC"/>
    <circle cx="700" cy="250" r="7" fill="#F8FAFC"/>
    <circle cx="980" cy="140" r="7" fill="#F8FAFC"/>
  </g>

  <g fill="#E2E8F0" font-family="Inter, Arial, sans-serif">
    <text x="130" y="170" font-size="38" font-weight="700">PathwayIQ</text>
    <text x="130" y="210" font-size="20" opacity="0.9">Admission readiness • Scenario planning • Transfer confidence</text>

    <rect x="130" y="260" width="260" height="120" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="150" y="305" font-size="18" font-weight="600">Readiness Score</text>
    <text x="150" y="350" font-size="36" font-weight="700">86 / 100</text>

    <rect x="430" y="260" width="280" height="120" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="450" y="305" font-size="18" font-weight="600">Blockers Remaining</text>
    <text x="450" y="350" font-size="36" font-weight="700">2</text>

    <rect x="750" y="260" width="290" height="120" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="770" y="305" font-size="18" font-weight="600">Scenario Delta</text>
    <text x="770" y="350" font-size="36" font-weight="700">+12%</text>
  </g>
</svg>
